      brais: "True self separated from stolen body"
    weight: high

  - id: E_FORNO_FOUND
    hour: 22
    name: "Agency finds them at The Forno — flee to The Nest"
    phase: dispersion
    type: fixed
    location: [the_forno, the_nest]
    characters: [kive, luka, saarah, cris, yeri, ali]
    description: "During the Forno party, news arrives: Nora and Pau kidnapped, Brais killed. And worse — The Agency tracked Luka here. They've been found. Ali knows The City's margins: she leads them to The Nest (El Nido — the hospital). They hide there. Kive devastated — his declaration caused all of this."
    arc_steps:
      kive: "Consequences hit — guilt and rage"
    weight: high
    notes: "The Forno goes from party to panic. Ali's local knowledge saves them. The Nest (hospital) is Nora's territory — hiding there is bittersweet since Nora is kidnapped."

  - id: E11
    hour: 24
    name: "Crossed dreams: Kive <-> Freya"
    phase: dispersion
    type: fixed
    location: ~
    characters: [kive, freya]
    description: "Midnight. Full crossed dreams. Both know it was real."
    weight: medium


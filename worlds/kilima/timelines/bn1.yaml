    phase: convergence
    type: fixed
    location: [the_limbo, the_cave]
    characters: [len]
    description: "Len projects from Limbo. Emotional earthquake. Kive sees dead sibling. Nora sees the child she mothered. Cannot warn about Brais-automaton."
    arc_steps:

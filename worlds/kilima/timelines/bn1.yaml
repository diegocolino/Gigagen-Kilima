    type: fixed
    location: the_cave
    characters: [luka, saarah]
    description: "Moment over food. Bond deepens. Two people who met at a funeral 38 hours ago."
    weight: medium

  - id: E_SPEECH_PREP
    hour: 40
    name: "Saarah and Kive prepare the speech"
    phase: convergence
    type: fixed
    location: the_cave
    characters: [saarah, kive]
    description: "Saarah writes. Kive speaks. Union rhetoric meets revolutionary fire. The declaration is CRAFTED, not improvised."
    arc_steps:
      saarah: "New allegiance — her words fuel the revolution"
    weight: high

  - id: E_CRIS_FREYA
